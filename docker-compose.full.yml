# docker-compose.full.yml — добавляем backend + frontend
# NOTE: поле version устарело в Docker Compose v2+ и убрано намеренно

# Включает всё из docker-compose.yml + добавляет backend и frontend.
# Запуск: docker compose -f docker-compose.yml -f docker-compose.full.yml up -d

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    environment:
      - PYTHONPATH=/app
      - POSTGRES_URL=postgresql+asyncpg://${POSTGRES_USER:-sphere}:${POSTGRES_PASSWORD}@postgres:5432/sphereplatform
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - WG_ROUTER_URL=${WG_ROUTER_URL}
      - WG_ROUTER_API_KEY=${WG_ROUTER_API_KEY}
      - AWG_H1=${AWG_H1}
      - AWG_H2=${AWG_H2}
      - AWG_H3=${AWG_H3}
      - AWG_H4=${AWG_H4}
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - WEB_CONCURRENCY=${WEB_CONCURRENCY:-4}
      - CORS_EXTRA_ORIGINS=${CORS_EXTRA_ORIGINS:-}
      - DEV_SKIP_AUTH=${DEV_SKIP_AUTH:-}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app                          # весь проект — backend.* импорты работают
      - /app/backend/__pycache__        # изолируем кэш
      - ./backend/updates:/app/backend/updates  # OTA APK файлы
    command: >
      sh -c '
        if [ "$ENVIRONMENT" = "development" ]; then
          uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/backend
        else
          gunicorn backend.main:app
            --worker-class uvicorn.workers.UvicornWorker
            --workers ${WEB_CONCURRENCY:-4}
            --bind 0.0.0.0:8000
            --graceful-timeout 30
            --timeout 120
            --keep-alive 65
            --max-requests 10000
            --max-requests-jitter 1000
            --access-logfile -
        fi
      '
    networks:
      - frontend-net
      - backend-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    user: "0"                    # root — нужно для записи в .next/ под Windows bind mount
    environment:
      - NEXT_PUBLIC_API_URL=/api/v1
      - NEXT_PUBLIC_WS_URL=
      - NEXT_PUBLIC_DEV_SKIP_AUTH=${DEV_SKIP_AUTH:-}
    ports:
      - "3002:3002"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules  # Linux-бинарники, не мешает хостовому node_modules
      - frontend_next_cache:/app/.next            # изолируем .next/ — хостовые артефакты prod-build ломают dev-сервер
    # Turbopack вместо webpack: нет eval() → нет "Code generation from strings disallowed" в Edge runtime
    command: ["sh", "-c", "npm install && npx next dev --turbopack -p 3002"]
    networks:
      - frontend-net

  # Override nginx из base docker-compose.yml — добавляем depends_on
  nginx:
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started

volumes:
  frontend_node_modules:   # Linux-совместимый node_modules, персистентный между перезапусками
  frontend_next_cache:     # dev-server .next/ кэш, изолирован от хостовых prod-артефактов
