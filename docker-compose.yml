# docker-compose.yml — только инфраструктура (PG, Redis, Nginx, n8n)
# NOTE: поле version устарело в Docker Compose v2+ и убрано намеренно

services:
  postgres:
    image: postgres:15-alpine
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c work_mem=8MB
      -c maintenance_work_mem=128MB
      -c effective_cache_size=512MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c idle_in_transaction_session_timeout=60000
      -c statement_timeout=30000
    environment:
      POSTGRES_DB: sphereplatform
      POSTGRES_USER: ${POSTGRES_USER:-sphere}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"          # только в dev! в production нет
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sphere}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - backend-net

  redis:
    image: redis:7.2-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
      --tcp-backlog 511
      --tcp-keepalive 300
    ports:
      - "6379:6379"          # только в dev!
    volumes:
      - redis_data:/data
    healthcheck:
      # FIX: пароль через REDISCLI_AUTH — не виден в docker inspect
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"$$REDIS_PASSWORD\" redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-net

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/tmp/nginx.conf.template:ro
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
    environment:
      # Домен подставляется в nginx.conf через envsubst при старте контейнера.
      # Меняй только здесь (в .env) — не нужно трогать nginx.conf
      SERVER_HOSTNAME: ${SERVER_HOSTNAME:-adb.leetpc.com}
    # envsubst заменяет ТОЛЬКО ${SERVER_HOSTNAME}, остальные nginx-переменные
    # ($host, $request_uri, $proxy_add_x_forwarded_for и т.д.) остаются нетронутыми.
    command:
      - /bin/sh
      - -c
      - "envsubst '$${SERVER_HOSTNAME}' < /tmp/nginx.conf.template > /etc/nginx/nginx.conf && exec nginx -g 'daemon off;'"
    # FIX: зависимость nginx от postgres была бессмысленной (nginx не работает с PG напрямую).
    # nginx стартует сразу и ждёт бэкенд по сети — backend задаётся в docker-compose.full.yml.
    networks:
      - frontend-net
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:1.32.0
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=n8n
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-sphere}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      # Custom nodes — mount compiled package
      - N8N_CUSTOM_EXTENSIONS=/home/node/.n8n/custom
      - NODE_PATH=/home/node/.n8n/custom/node_modules
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-nodes:/home/node/.n8n/custom/node_modules/n8n-nodes-sphereplatform
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend-net
      - frontend-net

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-spheredev}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-spheredev123}
    volumes:
      - minio_data:/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    # MED-10: TZ-04 SPLIT-5 использует MinIO для хранения скриншотов устройств

volumes:
  postgres_data:
  redis_data:
  minio_data:
  n8n_data:

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
    # NOTE: internal: true УДАЛЕНО намеренно.
    # Backend должен достигать внешних хостов:
    #   - TZ-06: WireGuard/AmneziaWG router (внешний VPS)
    #   - n8n:   исходящие webhook-запросы к внешним API
    # Изоляция обеспечивается на уровне Nginx (только /api/, /ws/ наружу).
