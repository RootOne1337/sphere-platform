# infrastructure/monitoring/docker-compose.monitoring.yml
# Мониторинговый стек: Prometheus + Grafana + Alertmanager + exporters
# Запуск: docker compose -f docker-compose.monitoring.yml up -d
# Или через корневой: docker compose -f docker-compose.yml -f infrastructure/monitoring/docker-compose.monitoring.yml up -d

services:
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: sphere-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert-rules.yml:/etc/prometheus/rules/alert-rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--web.enable-remote-write-receiver'
    networks:
      - monitoring-net
      - sphere-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: grafana/grafana:10.2.0
    container_name: sphere-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-sphere_grafana_2026}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/fleet-overview.json
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - monitoring-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: sphere-alertmanager
    restart: unless-stopped
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - monitoring-net
      - sphere-net

  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: sphere-node-exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - monitoring-net

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: sphere-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: ${POSTGRES_URL:-postgresql://sphere:sphere@postgres:5432/sphereplatform?sslmode=disable}
    networks:
      - monitoring-net
      - sphere-net

  redis-exporter:
    image: oliver006/redis_exporter:v1.55.0
    container_name: sphere-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: ${REDIS_URL:-redis://redis:6379}
    networks:
      - monitoring-net
      - sphere-net

volumes:
  prometheus_data:
  grafana_data:
  alertmanager_data:

networks:
  monitoring-net:
    driver: bridge
  sphere-net:
    external: true
    name: sphere-platform_sphere-net
