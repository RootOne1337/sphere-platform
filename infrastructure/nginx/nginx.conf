worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # Базовые настройки
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;  # не показывать версию

    # Размеры буферов для WebSocket
    proxy_buffer_size          128k;
    proxy_buffers              4 256k;
    proxy_busy_buffers_size    256k;

    # TLS настройки
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers (для всех, кроме HSTS — он только в HTTPS сервере)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # HTTP/2 включаем глобально (nginx 1.25.1+ — http2 on; в http-блоке, не в listen)
    http2 on;

    # Docker internal DNS resolver — резолвит имена контейнеров в runtime, не при старте
    # Это позволяет nginx стартовать даже если frontend временно не запущен
    resolver 127.0.0.11 valid=10s ipv6=off;

    # backend_pool убран — используется переменная $backend_upstream с resolver
    # (static upstream резолвит DNS при старте; переменная + resolver — при каждом запросе)
    # Это позволяет nginx стартовать даже если backend ещё не запущен

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_conn_zone $binary_remote_addr zone=ws_conn_limit:10m;

    # ── HTTP → HTTPS редирект (только для prod-домена) ───────────────────────
    server {
        listen 80;
        server_name ${SERVER_HOSTNAME};

        # Certbot ACME challenge (webroot) — НЕ редиректим, отвечаем статикой
        # Нужно для первичного получения и автообновления Let's Encrypt сертификата
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Всё остальное — на HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTP для localhost / dev-доступа (без SSL) ────────────────────────────
    server {
        listen 80 default_server;
        server_name localhost _;

        # WebSocket API
        location /api/v1/ws/ {
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
        }

        # REST API
        location /api/ {
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_connect_timeout 30s;
            proxy_read_timeout 120s;
            proxy_send_timeout 30s;
        }

        # WebSocket агентов
        location /ws/ {
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
        }

        # Frontend
        location / {
            set $frontend_upstream http://frontend:3002;
            proxy_pass $frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $http_connection;
        }

        location /health {
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream/api/v1/health/ready;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }
    }

    # ── Основной HTTPS сервер ─────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name ${SERVER_HOSTNAME};

        # Сертификаты Let's Encrypt (получаются скриптом scripts/init_ssl.sh)
        ssl_certificate     /etc/letsencrypt/live/${SERVER_HOSTNAME}/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/${SERVER_HOSTNAME}/privkey.pem;

        # HSTS только на HTTPS (RFC 6797 запрещает по HTTP)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── WebSocket API endpoints (must be before /api/ block) ──────────────
        location /api/v1/ws/ {
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
            limit_conn ws_conn_limit 100;  # max 100 WS per IP
        }

        # ── REST API ──────────────────────────────────────────────────────────
        location /api/ {
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";  # enable keepalive to upstream

            # Request ID для трейсинга
            proxy_set_header X-Request-ID $request_id;
            add_header X-Request-ID $request_id;

            # Таймауты для долгих API вызовов
            proxy_connect_timeout 30s;
            proxy_read_timeout 120s;
            proxy_send_timeout 30s;

            limit_req zone=api_limit burst=50 nodelay;
        }

        # ── WebSocket (агенты + операторы) ────────────────────────────────────
        location /ws/ {
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream;
            proxy_http_version 1.1;

            # КРИТИЧНО для WebSocket upgrade
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Увеличенные таймауты для long-lived соединений
            proxy_read_timeout 3600s;   # 1 час — агент держит соединение
            proxy_send_timeout 3600s;

            # Отключаем буферизацию для real-time данных
            proxy_buffering off;

            # Per-IP WS connection limit (prevent DoS)
            limit_conn ws_conn_limit 200;
        }

        # ── Frontend (Next.js) ────────────────────────────────────────────────
        location / {
            # Используем переменную → nginx резолвит frontend через Docker DNS
            # при каждом запросе (не при старте), nginx не падает если frontend ещё не готов
            set $frontend_upstream http://frontend:3002;
            proxy_pass $frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $http_connection;
        }

        # ── Prometheus metrics (только внутри сети) ───────────────────────────
        location /metrics {
            # FIX: 172.16.0.0/12 — RFC-1918 приватный диапазон, покрывает все Docker-подсети.
            allow 172.16.0.0/12;   # Docker сети (RFC-1918)
            allow 127.0.0.1;
            deny all;
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream/metrics;
        }

        # ── Health check endpoint for monitoring ──────────────────────────────
        location /health {
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream/api/v1/health/ready;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }
    }
}
