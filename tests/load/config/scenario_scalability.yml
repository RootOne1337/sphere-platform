# Sphere Platform — Полный тест масштабируемости
# Шаги: 32 → 64 → 128 → 256 → 512 → 1024 → 2048 → 4096 → 8192 → 10000
# Общее время: ~48 минут (без учёта ramp)

name: scalability-full
base_url: http://localhost:8000
ws_url: ws://localhost:8000
api_key: ""
seed: 42

heartbeat_interval: 30.0
telemetry_interval: 10.0
task_success_rate: 0.80
task_failure_rate: 0.15
task_duration_min: 2.0
task_duration_max: 30.0
enable_vpn: true
enable_video: false
video_fps: 15
random_disconnect_rate: 0.0001

report_dir: reports/scalability

steps:
  - name: "step-32"
    target_agents: 32
    ramp_up_sec: 10
    hold_sec: 60
    ramp_down_sec: 5
    pass_criteria:
      fleet_availability_gte: 99.0
      rest_device_register_latency_p99_lte: 2000

  - name: "step-64"
    target_agents: 64
    ramp_up_sec: 15
    hold_sec: 60
    ramp_down_sec: 5
    pass_criteria:
      fleet_availability_gte: 99.0

  - name: "step-128"
    target_agents: 128
    ramp_up_sec: 30
    hold_sec: 90
    ramp_down_sec: 10
    pass_criteria:
      fleet_availability_gte: 98.0

  - name: "step-256"
    target_agents: 256
    ramp_up_sec: 45
    hold_sec: 120
    ramp_down_sec: 15
    pass_criteria:
      fleet_availability_gte: 98.0

  - name: "step-512"
    target_agents: 512
    ramp_up_sec: 60
    hold_sec: 180
    ramp_down_sec: 30
    pass_criteria:
      fleet_availability_gte: 97.0
      ws_connect_latency_p99_lte: 5000

  - name: "step-1024"
    target_agents: 1024
    ramp_up_sec: 90
    hold_sec: 180
    ramp_down_sec: 30
    pass_criteria:
      fleet_availability_gte: 97.0
      ws_connect_latency_p99_lte: 8000

  - name: "step-2048"
    target_agents: 2048
    ramp_up_sec: 120
    hold_sec: 180
    ramp_down_sec: 30
    pass_criteria:
      fleet_availability_gte: 95.0
      ws_connect_latency_p99_lte: 12000

  - name: "step-4096"
    target_agents: 4096
    ramp_up_sec: 180
    hold_sec: 180
    ramp_down_sec: 60
    pass_criteria:
      fleet_availability_gte: 93.0

  - name: "step-8192"
    target_agents: 8192
    ramp_up_sec: 240
    hold_sec: 180
    ramp_down_sec: 60
    pass_criteria:
      fleet_availability_gte: 90.0

  - name: "step-10000"
    target_agents: 10000
    ramp_up_sec: 300
    hold_sec: 300
    ramp_down_sec: 60
    pass_criteria:
      fleet_availability_gte: 85.0
