# Sphere Platform — Soak-тест (длительная нагрузка)
# 512 агентов, 30 минут hold — проверка утечек памяти,
# накопления соединений, дрифта метрик

name: soak-512
base_url: http://localhost:8000
ws_url: ws://localhost:8000
api_key: ""
seed: 42

heartbeat_interval: 30.0
telemetry_interval: 10.0
task_success_rate: 0.80
task_failure_rate: 0.15
task_duration_min: 5.0
task_duration_max: 60.0
enable_vpn: true
enable_video: false
video_fps: 15
random_disconnect_rate: 0.0002

report_dir: reports/soak

steps:
  - name: "soak-ramp"
    target_agents: 512
    ramp_up_sec: 90
    hold_sec: 60
    ramp_down_sec: 10
    pass_criteria:
      fleet_availability_gte: 97.0

  - name: "soak-hold"
    target_agents: 512
    ramp_up_sec: 1
    hold_sec: 1800
    ramp_down_sec: 10
    pass_criteria:
      fleet_availability_gte: 97.0
      ws_connect_latency_p99_lte: 5000
